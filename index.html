<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,300;0,500;0,600;1,100&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/login.css">
    <link rel="stylesheet" href="src/css/animations.css">
    <link rel="icon" href="data:,">
    <title>Admin Login - Inventory System</title>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="src/img/logo.png" alt="Logo" class="login-logo">
                <h1>RMNHS Supplies Inventory</h1>
                <p>Admin Portal</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="showForgotPassword()">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fa-solid fa-sign-in-alt"></i>
                    Sign In
                </button>
                
                <!-- Loading spinner -->
                <div id="loginLoading" class="loading-overlay" style="display: none;">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                </div>
            </form>

            <!-- Add Forgot Password Modal -->
            <div id="forgotPasswordModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Reset Password</h3>
                        <button onclick="closeForgotPassword()">&times;</button>
                    </div>
                    <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
                        <div class="form-group">
                            <label for="resetEmail">Enter your email</label>
                            <input type="email" id="resetEmail" required placeholder="your@email.com">
                        </div>
                        <div class="form-actions">
                            <button type="button" onclick="closeForgotPassword()" class="btn btn-secondary">Cancel</button>
                            <button type="submit" id="resetPasswordBtn" class="btn btn-primary">Send Reset Link</button>
                        </div>
                        <div id="resetCountdown" class="countdown-message" style="display: none; margin-top: 10px; color: #666; font-size: 0.9em;"></div>
                    </form>
                </div>
            </div>

            <!-- Add Sign Up Modal -->
            <div id="signupModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3><i class="fa-solid fa-user-plus"></i> Create Admin Account</h3>
                        <button onclick="closeSignup()">&times;</button>
                    </div>
                    <form id="signupForm" onsubmit="handleSignup(event)">
                        <div class="form-group">
                            <label for="signupEmail"><i class="fa-solid fa-envelope"></i> Email</label>
                            <input type="email" id="signupEmail" required placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label for="signupPassword"><i class="fa-solid fa-lock"></i> Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="signupPassword" required minlength="8" placeholder="Min 8 characters">
                                <i class="fa-solid fa-eye toggle-password" id="toggleSignupPassword"></i>
                            </div>
                            <span class="password-hint"><i class="fa-solid fa-info-circle"></i> Must be at least 8 characters</span>
                        </div>
                        <div class="form-group">
                            <label for="signupConfirmPassword"><i class="fa-solid fa-lock"></i> Confirm Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="signupConfirmPassword" required placeholder="Confirm your password">
                                <i class="fa-solid fa-eye toggle-password" id="toggleSignupConfirmPassword"></i>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" onclick="closeSignup()" class="btn btn-secondary"><i class="fa-solid fa-times"></i> Cancel</button>
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Create Account</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="login-footer">
                <p>© 2026 RMNHS Supplies Inventory System. All rights reserved.</p>
                <p style="margin-top: 10px;">Don't have an account? <a href="#" onclick="showSignup()">Create Account</a></p>
            </div>
        </div>

        <!-- Decorative Elements -->
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
    </div>

    <!-- Password Reset Modal (shown when coming from recovery email) -->
    <div id="passwordResetModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-lock"></i> Set New Password</h3>
                <button onclick="closePasswordReset()">&times;</button>
            </div>
            <form id="passwordResetForm" onsubmit="handlePasswordReset(event)">
                <div class="form-group">
                    <label for="newPassword"><i class="fa-solid fa-key"></i> New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" required minlength="8" placeholder="Min 8 characters">
                        <i class="fa-solid fa-eye toggle-password" id="toggleNewPassword"></i>
                    </div>
                    <span class="password-hint"><i class="fa-solid fa-info-circle"></i> Must be at least 8 characters</span>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword"><i class="fa-solid fa-key"></i> Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmNewPassword" required placeholder="Confirm your password">
                        <i class="fa-solid fa-eye toggle-password" id="toggleConfirmNewPassword"></i>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="closePasswordReset()" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    <button type="submit" id="updatePasswordBtn" class="btn btn-primary"><i class="fa-solid fa-save"></i> Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { signIn, getCurrentUser, resetPassword, signUp, updatePassword } from './src/js/supabaseAuth.js';

        // Also import supabase client directly for session handling
        import { supabase } from './src/js/supabase.js';

        // Global flag to track if session is ready for password reset
        window.passwordResetSessionReady = false;

        // Check for password reset flow on page load
        async function checkPasswordResetFlow() {
            const hash = window.location.hash;
            const search = window.location.search;
            
            // Check if we have an access_token in the URL (from Supabase recovery email)
            // or if we're in a reset flow
            const hasRecoveryToken = hash.includes('access_token') || hash.includes('type=recovery');
            const isResetFlow = search.includes('reset=true') || hash.includes('type=recovery');
            
            if (hasRecoveryToken || isResetFlow) {
                // Show password reset modal
                document.getElementById('passwordResetModal').style.display = 'flex';
                // Hide login container
                document.querySelector('.login-container').style.display = 'none';
                
                // Wait for session to be detected from URL
                // Supabase needs time to process the URL hash and exchange tokens
                await waitForPasswordResetSession();
                return true;
            }
            return false;
        }

        // Wait for the session to be established from the URL hash
        async function waitForPasswordResetSession() {
            const submitBtn = document.getElementById('updatePasswordBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Preparing reset...';
            
            let attempts = 0;
            const maxAttempts = 20; // Wait up to 10 seconds (20 * 500ms)
            
            const checkSession = async () => {
                attempts++;
                
                // Try to get the session - this will trigger URL processing if tokens are present
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (session && !error) {
                    // Session is ready!
                    window.passwordResetSessionReady = true;
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-save"></i> Update Password';
                    console.log('Password reset session ready');
                    return;
                }
                
                // If URL has tokens but session isn't ready yet, wait and retry
                if (window.location.hash.includes('access_token') && attempts < maxAttempts) {
                    console.log(`Waiting for session... attempt ${attempts}/${maxAttempts}`);
                    setTimeout(checkSession, 500);
                } else if (attempts >= maxAttempts) {
                    // Timeout - show error but allow user to try anyway
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-save"></i> Update Password';
                    console.warn('Session detection timeout - allowing manual attempt');
                    window.passwordResetSessionReady = true; // Allow attempt anyway
                }
            };
            
            // Start checking
            await checkSession();
        }

        // Handle password reset form submission
        window.handlePasswordReset = async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            const submitBtn = document.getElementById('updatePasswordBtn');
            
            if (newPassword !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            if (newPassword.length < 8) {
                alert('Password must be at least 8 characters long!');
                return;
            }
            
            // Wait for session to be ready if we haven't confirmed yet
            if (!window.passwordResetSessionReady) {
                // Force check session one more time
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    alert('Please wait - the reset session is still being prepared. Please try again in a few seconds.');
                    return;
                }
            }
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';
            
            try {
                const { data, error } = await updatePassword(newPassword);
                
                if (error) {
                    // Check if it's an auth session error
                    if (error.message && error.message.includes('Auth session missing')) {
                        alert('Your reset session has expired. Please request a new password reset link.');
                        // Clear the hash and redirect
                        window.location.hash = '';
                        window.location.search = '';
                        window.location.reload();
                        return;
                    }
                    alert('Error updating password: ' + error.message);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-save"></i> Update Password';
                } else {
                    // Clear the reset flow flag
                    localStorage.removeItem('inPasswordResetFlow');
                    alert('Password updated successfully! Please log in with your new password.');
                    // Clear the hash and redirect to clean login page
                    window.location.hash = '';
                    window.location.search = '';
                    document.getElementById('passwordResetModal').style.display = 'none';
                    document.querySelector('.login-container').style.display = 'flex';
                }
            } catch (error) {
                console.error('Password reset error:', error);
                alert('An unexpected error occurred. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-save"></i> Update Password';
            }
        };

        // Close password reset modal and return to login
        window.closePasswordReset = function() {
            // Clear the reset flow flag
            localStorage.removeItem('inPasswordResetFlow');
            // Clear the URL hash and search
            window.location.hash = '';
            window.location.search = '';
            // Reset the password reset modal
            document.getElementById('passwordResetModal').style.display = 'none';
            document.getElementById('passwordResetForm').reset();
            // Show login container
            document.querySelector('.login-container').style.display = 'flex';
            // Reset the session ready flag
            window.passwordResetSessionReady = false;
        };

        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        // Toggle signup password visibility
        const toggleSignupPassword = document.getElementById('toggleSignupPassword');
        const signupPasswordInput = document.getElementById('signupPassword');

        if (toggleSignupPassword && signupPasswordInput) {
            toggleSignupPassword.addEventListener('click', () => {
                const type = signupPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                signupPasswordInput.setAttribute('type', type);
                toggleSignupPassword.classList.toggle('fa-eye');
                toggleSignupPassword.classList.toggle('fa-eye-slash');
            });
        }

        // Toggle signup confirm password visibility
        const toggleSignupConfirmPassword = document.getElementById('toggleSignupConfirmPassword');
        const signupConfirmPasswordInput = document.getElementById('signupConfirmPassword');

        if (toggleSignupConfirmPassword && signupConfirmPasswordInput) {
            toggleSignupConfirmPassword.addEventListener('click', () => {
                const type = signupConfirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                signupConfirmPasswordInput.setAttribute('type', type);
                toggleSignupConfirmPassword.classList.toggle('fa-eye');
                toggleSignupConfirmPassword.classList.toggle('fa-eye-slash');
            });
        }

        // Toggle new password visibility (password reset)
        const toggleNewPassword = document.getElementById('toggleNewPassword');
        const newPasswordInput = document.getElementById('newPassword');

        if (toggleNewPassword && newPasswordInput) {
            toggleNewPassword.addEventListener('click', () => {
                const type = newPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                newPasswordInput.setAttribute('type', type);
                toggleNewPassword.classList.toggle('fa-eye');
                toggleNewPassword.classList.toggle('fa-eye-slash');
            });
        }

        // Toggle confirm new password visibility (password reset)
        const toggleConfirmNewPassword = document.getElementById('toggleConfirmNewPassword');
        const confirmNewPasswordInput = document.getElementById('confirmNewPassword');

        if (toggleConfirmNewPassword && confirmNewPasswordInput) {
            toggleConfirmNewPassword.addEventListener('click', () => {
                const type = confirmNewPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                confirmNewPasswordInput.setAttribute('type', type);
                toggleConfirmNewPassword.classList.toggle('fa-eye');
                toggleConfirmNewPassword.classList.toggle('fa-eye-slash');
            });
        }

        // Check if already logged in (skip if in password reset flow)
        async function checkAuth() {
            // First, always check for password reset flow - this takes priority
            const isResetFlow = window.location.hash.includes('access_token') || 
                               window.location.hash.includes('type=recovery') ||
                               window.location.search.includes('reset=true');
            
            if (isResetFlow) {
                // Set flag to prevent redirect loop during password reset
                localStorage.setItem('inPasswordResetFlow', 'true');
                // Use the async checkPasswordResetFlow to handle session detection
                await checkPasswordResetFlow();
                return;
            }
            
            // Check if we're in the middle of a password reset flow
            if (localStorage.getItem('inPasswordResetFlow') === 'true') {
                // Still in reset flow, show the modal and wait for session
                document.getElementById('passwordResetModal').style.display = 'flex';
                document.querySelector('.login-container').style.display = 'none';
                await waitForPasswordResetSession();
                return;
            }
            
            // Only check for existing session if not in reset flow
            const { user, error } = await getCurrentUser();
            if (user && !error) {
                window.location.href = 'dashboard.html';
            }
        }
        checkAuth();

        // Handle login form submission
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loginLoading');
            
            // Show loading
            loginBtn.disabled = true;
            loading.style.display = 'flex';
            
            try {
                const { data, error } = await signIn(email, password);
                
                if (error) {
                    alert('Login failed: ' + error.message);
                    return;
                }
                
                // Store user info in localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', data.user.email);
                localStorage.setItem('userId', data.user.id);
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error('Login error:', error);
                alert('An unexpected error occurred. Please try again.');
            } finally {
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Forgot Password Functions
        window.showForgotPassword = function() {
            document.getElementById('forgotPasswordModal').style.display = 'flex';
        }

        window.closeForgotPassword = function() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
        }

        // Rate limiting configuration
        const RESET_COOLDOWN_SECONDS = 60;
        const RESET_STORAGE_KEY = 'lastPasswordResetRequest';

        // Check if user is in cooldown period on page load
        function checkResetCooldown() {
            const lastRequest = localStorage.getItem(RESET_STORAGE_KEY);
            if (lastRequest) {
                const elapsed = Date.now() - parseInt(lastRequest);
                const remaining = RESET_COOLDOWN_SECONDS * 1000 - elapsed;
                if (remaining > 0) {
                    startResetCooldown(Math.ceil(remaining / 1000));
                }
            }
        }

        // Start cooldown timer
        function startResetCooldown(seconds) {
            const submitBtn = document.getElementById('resetPasswordBtn');
            const countdownDiv = document.getElementById('resetCountdown');
            
            submitBtn.disabled = true;
            countdownDiv.style.display = 'block';
            
            let remaining = seconds;
            
            const updateCountdown = () => {
                if (remaining > 0) {
                    countdownDiv.textContent = `Please wait ${remaining} seconds before requesting another reset link.`;
                    remaining--;
                    setTimeout(updateCountdown, 1000);
                } else {
                    submitBtn.disabled = false;
                    countdownDiv.style.display = 'none';
                    localStorage.removeItem(RESET_STORAGE_KEY);
                }
            };
            
            updateCountdown();
        }

        window.handleForgotPassword = async function(e) {
            e.preventDefault();
            
            // Check cooldown
            const lastRequest = localStorage.getItem(RESET_STORAGE_KEY);
            if (lastRequest) {
                const elapsed = Date.now() - parseInt(lastRequest);
                if (elapsed < RESET_COOLDOWN_SECONDS * 1000) {
                    const remaining = Math.ceil((RESET_COOLDOWN_SECONDS * 1000 - elapsed) / 1000);
                    alert(`Please wait ${remaining} seconds before requesting another reset link.`);
                    return;
                }
            }
            
            const email = document.getElementById('resetEmail').value;
            const submitBtn = document.getElementById('resetPasswordBtn');
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            
            try {
                const { error } = await resetPassword(email);
                
                if (error) {
                    // Check for rate limit error
                    if (error.status === 429 || error.message?.includes('rate limit') || error.message?.includes('too many requests')) {
                        alert('Too many requests. Please wait a minute before trying again.');
                    } else {
                        alert('Error: ' + error.message);
                    }
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Send Reset Link';
                } else {
                    // Store timestamp and start cooldown
                    localStorage.setItem(RESET_STORAGE_KEY, Date.now().toString());
                    alert('Password reset link sent to your email!');
                    startResetCooldown(RESET_COOLDOWN_SECONDS);
                    document.getElementById('resetEmail').value = '';
                }
            } catch (error) {
                console.error('Password reset error:', error);
                alert('An unexpected error occurred. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Reset Link';
            }
        }

        // Check cooldown on page load
        checkResetCooldown();

        // Sign Up Functions
        window.showSignup = function() {
            document.getElementById('signupModal').style.display = 'flex';
        }

        window.closeSignup = function() {
            document.getElementById('signupModal').style.display = 'none';
        }

        window.handleSignup = async function(e) {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            if (password.length < 8) {
                alert('Password must be at least 8 characters long!');
                return;
            }
            
            const { data, error } = await signUp(email, password);
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Account created successfully! Please check your email to confirm your account.');
                closeSignup();
            }
        }
    </script>
</body>
</html>
